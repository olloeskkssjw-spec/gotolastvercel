services:
  - type: web
    name: ezcash-api
    runtime: node
    buildCommand: npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

  - type: web
    name: ezcash-show
    runtime: static
    buildCommand: npm install -g pnpm@10 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/ezcash-show run build
    staticPublishPath: artifacts/ezcash-show/dist/public
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
